<!DOCTYPE html>
<html>
<head>
    <title>Place Bid</title>
</head>
<body>
    <h1>Place Bid</h1>
    <form action="/bidding/api/bids/forward" method="post">
        <label for="itemId">Item ID:</label>
        <input type="number" id="itemId" name="itemId" required><br />

        <label for="bidderId">Bidder ID:</label>
        <input type="number" id="bidderId" name="bidderId" required><br />

        <label for="bidAmount">Bid Amount:</label>
        <input type="number" id="bidAmount" name="bidAmount" step="0.01" required><br />

        <button type="submit">Place Bid</button>
    </form>
</body>
</html>
