<!DOCTYPE html>
<html>
<head>
    <title>Search Items</title>
</head>
<body>
    <h1>Search Items</h1>
    <form action="/bidding/api/items/search" method="get">
        <label for="keyword">Keyword:</label>
        <input type="text" id="keyword" name="keyword" required><br />

        <button type="submit">Search</button>
    </form>

    <h2>Search Results</h2>
    <ul id="searchResults">
        <!-- Search results will be displayed here -->
    </ul>

    <script>
        // JavaScript to handle form submission and display results
        document.querySelector('form').addEventListener('submit', async (event) => {
            event.preventDefault(); // Prevent the form from submitting the traditional way

            const keyword = document.getElementById('keyword').value;
            const response = await fetch(`/bidding/api/items/search?keyword=${encodeURIComponent(keyword)}`);
            const items = await response.json();

            const resultsList = document.getElementById('searchResults');
            resultsList.innerHTML = ''; // Clear previous results

            items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = `${item.name} - ${item.description} - $${item.currentPrice}`;
                resultsList.appendChild(li);
            });
        });
    </script>
</body>
</html>
