<!DOCTYPE html>
<html>
<head>
    <title>Sell Item</title>
</head>
<body>
    <h1>Sell Item</h1>
    <form action="/bidding/api/items/sell" method="post">
        <label for="name">Item Name:</label>
        <input type="text" id="name" name="name" required><br />

        <label for="description">Description:</label>
        <input type="text" id="description" name="description" required><br />

        <label for="auctionType">Auction Type:</label>
        <select id="auctionType" name="auctionType" required>
            <option value="FORWARD">Forward Auction</option>
            <option value="DUTCH">Dutch Auction</option>
        </select><br />

        <label for="initialPrice">Initial Price:</label>
        <input type="number" id="initialPrice" name="initialPrice" step="0.01" required><br />

        <label for="currentPrice">Current Price:</label>
        <input type="number" id="currentPrice" name="currentPrice" step="0.01" required><br />

        <label for="endTime">End Time:</label>
        <input type="datetime-local" id="endTime" name="endTime" required><br />

        <label for="sellerId">Seller ID:</label>
        <input type="number" id="sellerId" name="sellerId" required><br />

        <button type="submit">Sell Item</button>
    </form>
</body>
</html>
